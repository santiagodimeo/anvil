name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Post progress + inline review comments on the PR
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:

            1. Correctness — logic errors, unhandled edge cases, broken error handling
            2. Security — injection, auth/authz gaps, unsanitized input, leaked secrets
            3. Performance — obvious bottlenecks, N+1 queries, wasteful work
            4. Tests — missing coverage for the changed behavior
            5. Clarity — naming, readability, dead code

            Leave inline comments for specific issues. Use a top-level comment for
            general observations. Be concise; skip praise unless it's load-bearing.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
