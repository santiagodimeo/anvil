name: CI

on:
  push:
    branches: [main, {{BASE_BRANCH}}]
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: pin Xcode version if the project needs a specific one:
      # - uses: maxim-lobanov/setup-xcode@v1
      #   with: { xcode-version: latest-stable }
      # The verify gate — keep in sync with the {{PROJECT_SLUG}}-verify skill.
      - run: {{VERIFY_CMD}}
