name: CI

on:
  push:
    branches: [main, {{BASE_BRANCH}}]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # The verify gate — keep in sync with the {{PROJECT_SLUG}}-verify skill.
      - run: {{VERIFY_CMD}}
